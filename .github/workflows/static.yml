# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4
        # NOTE: Removed the 'with: path: ./' block here to avoid YAML syntax errors 
        # and allow the default checkout behavior, which we compensate for below.

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # The Action environment is placing the code in a nested path, 
      # so we must explicitly define the inner directory as the working directory.
      - name: Install dependencies
        run: npm install
        working-directory: Personal-Portfolio 

      - name: Build project
        run: npm run build
        working-directory: Personal-Portfolio

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The 'dist' folder is created inside the nested folder, so we must point to it.
          path: './Personal-Portfolio/dist' 
