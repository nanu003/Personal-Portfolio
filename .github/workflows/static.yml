name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job: Sets up environment, installs dependencies, runs build script, and creates the artifact.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Default checkout path is used here.

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        # This addresses the historical nested folder issue
        working-directory: Personal-Portfolio

      - name: Build project
        run: npm run build
        working-directory: Personal-Portfolio
        
      # ➡️ STEP A: UPLOAD ARTIFACT
      # This step takes the compiled code (from the build step) and uploads it 
      # under the specific name ('github-pages') that the final deploy action expects.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This path points to the 'dist' folder created inside the nested project folder
          path: './Personal-Portfolio/dist'

      # ➡️ STEP B: DEPLOY PAGES
      # This step finds the uploaded 'github-pages' artifact and pushes it live.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
