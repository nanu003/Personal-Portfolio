name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job: Sets up environment, installs dependencies, runs build script, and creates the artifact.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # We assume the last file path fixes are active, so we use default checkout.

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        # We use working-directory here to correctly address the nested folder issue found earlier.
        working-directory: Personal-Portfolio

      - name: Build project
        run: npm run build
        working-directory: Personal-Portfolio
        
      # ➡️ NEW: This replaces the old Setup Pages and Upload Artifact steps.
      # It automatically finds the deployment artifact (which is now built)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# ➡️ Note: The dependency on 'upload-pages-artifact' is now managed internally by 'deploy-pages'.
